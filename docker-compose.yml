services:
  mysql:
    image: mysql:8
    container_name: contest_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_change_me}
      MYSQL_DATABASE: ${DB_NAME:-contest_system}
      MYSQL_USER: ${DB_USER:-contest}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-p${DB_ROOT_PASSWORD:-root_change_me}']
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: contest_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysqldata:
  redisdata:
