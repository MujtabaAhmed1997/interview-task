services:
  postgres:
    image: postgres:16-alpine
    container_name: contest_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-contest_system}
      POSTGRES_USER: ${DB_USER:-contest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-contest}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contest_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
